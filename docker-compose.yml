  #   restart: "no"

  mcp_weather_service:
    build: ./services/mcp_weather_service
    develop:
      watch:
        - path: ./services/mcp_weather_service
          action: rebuild
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      start_period: 5s

  backend:
    build: ./backend
    develop:
      watch:
        - path: ./backend/src
          action: rebuild
        - path: ./backend/3rdparty
          action: rebuild
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      # OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_SUMMARIZER_MODEL: ${OLLAMA_SUMMARIZER_MODEL:-qwen2.5:7b}
      USE_AWS_STORE: "0"
      USE_REDIS_STORE: "1"
      REDIS_URL: "redis://redis:6379"
      CORS_ORIGINS: '["http://localhost:5173"]'
      INTERNAL_S3_ENDPOINT_URL: http://s3:9000
      EXTERNAL_S3_ENDPOINT_URL: http://localhost:9444
      POSTGRES_URL: postgresql://finance_user:${POSTGRES_PASSWORD:-finance_password}@postgres:5432/finance_db
      WEATHER_SERVICE_URL: http://mcp_weather_service:8002
      RAG_SERVICE_URL: http://mcp_documents:8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 5s
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      mcp_weather_service:
        condition: service_started
      mcp_documents:
        condition: service_started
    # depends_on:
    # ollama-pull:
    # condition: service_completed_successfully

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp_documents:
    build: ./services/mcp_documents
    env_file:
      - .env
    develop:
      watch:
        - path: ./services/mcp_documents
          action: rebuild
    ports:
      - "8003:8003"
    environment:
      RAG_DB_URL: postgresql://finance_user:${POSTGRES_PASSWORD:-finance_password}@postgres:5432/finance_db
      REDIS_URL: redis://redis:6379
      INTERNAL_S3_ENDPOINT_URL: http://s3:9000
      EXTERNAL_S3_ENDPOINT_URL: http://localhost:9444
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      VISION_MODEL: ${VISION_MODEL}
      VISION_PROVIDER: ${VISION_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_password}
      POSTGRES_DB: finance_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    develop:
      watch:
        - path: ./frontend/src
          action: sync
          target: /app/src
        - path: ./frontend/package.json
          action: rebuild
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

  s3:
    image: scireum/s3-ninja:8.7.0
    ports:
      - 9444:9000
    volumes:
      - ./s3data:/data
      - ./s3data/multipart:/home/sirius/multipart
      - ./s3data/s3ninja-logs:/home/sirius/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ui"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama-data:
  redis-data:
  postgres-data:
  s3ninja-logs:
    driver: local
